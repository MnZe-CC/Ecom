{% extends "admin/base_admin.html" %}

{% block title %}{% if product %}Edit Product{% else %}Add New Product{% endif %} - Admin Panel{% endblock %}

{% block admin_content %}
<div class="container">
    <h2>{% if product %}Edit Product{% else %}Add New Product{% endif %}</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name_en">English Name</label>
            <input type="text" id="name_en" name="name_en" value="{{ product.name_en if product else '' }}" required>
        </div>

        <div class="form-group">
            <label for="name_ar">Arabic Name</label>
            <input type="text" id="name_ar" name="name_ar" value="{{ product.name_ar if product else '' }}" required>
        </div>

        <div class="form-group">
            <label for="description_en">English Description</label>
            <textarea id="description_en" name="description_en" rows="4">{{ product.description_en if product else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="description_ar">Arabic Description</label>
            <textarea id="description_ar" name="description_ar" rows="4">{{ product.description_ar if product else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price if product else '0' }}" required>
        </div>

        <div class="form-group">
            <label for="stock_status">Stock Status</label>
            <select id="stock_status" name="stock_status">
                <option value="in_stock" {% if product and product.stock_status == 'in_stock' %}selected{% endif %}>In Stock</option>
                <option value="out_of_stock" {% if product and product.stock_status == 'out_of_stock' %}selected{% endif %}>Out of Stock</option>
                <option value="limited" {% if product and product.stock_status == 'limited' %}selected{% endif %}>Limited Availability</option>
            </select>
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id">
                <option value="">Select a category</option>
                {% for category in categories %}
                <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>
                    {{ category.name_en }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="images">Product Images</label>
            <input type="file" id="images" name="images" multiple accept="image/*">
            <small>You can select multiple images</small>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if product %}Update Product{% else %}Add Product{% endif %}</button>
            <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
