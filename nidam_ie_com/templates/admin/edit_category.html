{% extends "admin/base_admin.html" %}

{% block title %}{% if category %}Edit Category{% else %}Add New Category{% endif %} - Admin Panel{% endblock %}

{% block admin_content %}
<div class="container">
    <h2>{% if category %}Edit Category{% else %}Add New Category{% endif %}</h2>

    <form method="POST">
        <div class="form-group">
            <label for="name_en">English Name</label>
            <input type="text" id="name_en" name="name_en" value="{{ category.name_en if category else '' }}" required>
        </div>

        <div class="form-group">
            <label for="name_ar">Arabic Name</label>
            <input type="text" id="name_ar" name="name_ar" value="{{ category.name_ar if category else '' }}" required>
        </div>

        <div class="form-group">
            <label for="description_en">English Description</label>
            <textarea id="description_en" name="description_en" rows="3">{{ category.description_en if category else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="description_ar">Arabic Description</label>
            <textarea id="description_ar" name="description_ar" rows="3">{{ category.description_ar if category else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if category %}Update Category{% else %}Add Category{% endif %}</button>
            <a href="{{ url_for('admin.categories') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
