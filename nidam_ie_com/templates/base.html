<!DOCTYPE html>
<html lang="{{ language or 'en' }}" dir="{{ dir or 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nidam IE Commerce{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% if language == 'ar' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles-ar.css') }}">
    {% endif %}
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
