# Nginx configuration for nidam-ie-com

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # Replace with your domain

    # Disable access logging for static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        root /path/to/nidam-ie-com/static;  # Update with actual path
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Serve static files
    location /static {
        alias /path/to/nidam-ie-com/static;  # Update with actual path
        expires 1M;
        add_header Cache-Control "public";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Logging
    access_log /var/log/nginx/nidam_ie_com.access.log;
    error_log /var/log/nginx/nidam_ie_com.error.log;
}

# HTTPS server block (optional)
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;  # Replace with your domain

    # SSL certificate settings (update with your certificate paths)
    ssl_certificate /path/to/ssl/certificate.crt;
    ssl_certificate_key /path/to/ssl/private.key;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
    ssl_ecdh_curve prime256v1;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Disable access logging for static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        root /path/to/nidam-ie-com/static;  # Update with actual path
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Serve static files
    location /static {
        alias /path/to/nidam-ie-com/static;  # Update with actual path
        expires 1M;
        add_header Cache-Control "public";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    access_log /var/log/nginx/nidam_ie_com.access.log;
    error_log /var/log/nginx/nidam_ie_com.error.log;
}